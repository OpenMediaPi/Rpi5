# OTA updater configuration
# MANIFEST_URL should point to a plain text manifest with keys:
# VERSION=<string>
# BUNDLE_URL=<https://.../update-<version>.raucb>
# SHA256=<optional sha256 of bundle>
MANIFEST_URL=""

# Set if Jenkins artifacts require auth.
JENKINS_USER=""
JENKINS_TOKEN=""

# Poll interval is configured in systemd timer; this controls behavior only.
AUTO_REBOOT="false"
WORK_DIR="/data/ota"
