image boot.vfat {
  vfat {
    files = {
      "bcm2712-rpi-5-b.dtb",
      "Image",
      "config.txt",
      "cmdline.txt"
    }
  }
  size = 256M
}

image rpi5-kodi-ota.img {
  hdimage {
    partition-table-type = "gpt"
  }

  partition boot {
    image = "boot.vfat"
    offset = 8M
    partition-type-uuid = U
    bootable = "true"
  }

  partition rootfsA {
    image = "rootfs.ext4"
    partition-type-uuid = L
    size = 1024M
  }

  partition rootfsB {
    image = "rootfs.ext4"
    partition-type-uuid = L
    size = 1024M
  }

  partition data {
    partition-type-uuid = L
    size = 512M
  }
}
